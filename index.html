<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#f5f5f7" />
<meta name="description" content="Type a German plate prefix to find the city and how far it is from you." />
<title>Kennzeichen-Finder</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --page:#e9e9ed;
    --surface:#f5f5f7;
    --card:#ffffff;
    --ink:#1c1c1e;
    --ink2:#6e6e73;
    --ink3:#8a8a8e;
    --line:#ececf0;
    --blue:#007aff;
    --plate-blue:#003399;
    --gold:#ffcc00;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    color:var(--ink);
    background:var(--page);
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:
      max(env(safe-area-inset-top),40px)
      max(env(safe-area-inset-right),18px)
      max(env(safe-area-inset-bottom),28px)
      max(env(safe-area-inset-left),18px);
  }
  .app{
    width:440px;max-width:100%;
    background:var(--surface);
    border-radius:30px;
    padding:34px 28px 36px;
    box-shadow:0 2px 4px rgba(0,0,0,.04), 0 22px 60px rgba(0,0,0,.12);
  }

  /* header */
  header{text-align:center;}
  .flag{display:inline-flex;height:17px;border-radius:5px;overflow:hidden;
        box-shadow:0 2px 6px rgba(0,0,0,.18);}
  .flag i{display:block;width:20px;height:100%;}
  .flag .b{background:#161616;} .flag .r{background:#d7141a;} .flag .g{background:var(--gold);}
  h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;
     color:var(--ink);margin:14px 0 0;}
  .sub{font-size:14px;color:var(--ink2);margin-top:5px;line-height:1.4;}

  /* plate input */
  .plate{
    margin-top:26px;display:flex;align-items:stretch;height:76px;
    background:var(--card);border:2px solid #111;border-radius:12px;overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,.05), 0 12px 30px rgba(0,0,0,.14);
    cursor:text;
  }
  .plate .eu{
    width:50px;flex:none;background:var(--plate-blue);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:10px 0;
  }
  .plate .eu .stars{color:var(--gold);font-size:10px;line-height:10px;letter-spacing:1px;text-align:center;}
  .plate .eu .d{color:#fff;font-weight:700;font-size:15px;font-family:'Archivo',sans-serif;}
  .plate input{
    flex:1;min-width:0;border:0;background:transparent;outline:0;
    font-family:'Archivo',sans-serif;font-weight:800;font-size:44px;letter-spacing:4px;
    color:#161616;text-transform:uppercase;padding:0 10px 0 24px;
    caret-color:var(--blue);
  }
  .plate input::placeholder{color:#c7c7cc;}

  .hint{font-size:12.5px;color:var(--ink3);margin-top:12px;text-align:center;}
  .hint b{color:#48484a;font-weight:700;}

  /* suggestions */
  .suggest{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
  .suggest button{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    text-align:left;background:var(--card);border:0;border-radius:14px;padding:13px 16px;cursor:pointer;
    box-shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 20px rgba(0,0,0,.06);
    font-family:inherit;
  }
  .suggest button .sc{font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;letter-spacing:1px;color:var(--ink);}
  .suggest button .sn{color:var(--ink2);font-size:14px;}

  /* result card */
  .result{
    margin-top:26px;background:var(--card);border-radius:22px;padding:26px;
    box-shadow:0 1px 2px rgba(0,0,0,.04), 0 14px 38px rgba(0,0,0,.10);
    opacity:0;transform:translateY(10px);transition:opacity .3s ease, transform .3s cubic-bezier(.2,.8,.2,1);
    display:none;
  }
  .result.show{display:block;opacity:1;transform:none;}
  .rhead{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .city{font-family:'Archivo',sans-serif;font-weight:800;font-size:33px;letter-spacing:-.02em;color:var(--ink);line-height:1.05;}
  .region{font-size:14px;color:var(--ink3);margin-top:3px;}
  .badge{flex:none;background:#f2f2f7;border-radius:10px;padding:8px 12px;
         font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;letter-spacing:1px;color:var(--ink);}

  .divider{height:1px;background:var(--line);margin:22px 0;}

  .distrow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
  .dlabel{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
  .dval{display:flex;align-items:baseline;gap:6px;margin-top:4px;}
  .dnum{font-family:'Archivo',sans-serif;font-weight:800;font-size:42px;line-height:1;color:var(--blue);}
  .dunit{font-size:17px;font-weight:600;color:var(--blue);}
  .dmeta{text-align:right;}
  .dmeta div{font-size:12.5px;color:var(--ink3);}
  .dmeta div+div{margin-top:3px;}

  .geo-btn{
    margin-top:24px;width:100%;height:52px;border:0;border-radius:14px;cursor:pointer;
    background:var(--blue);color:#fff;font-family:inherit;font-weight:600;font-size:16.5px;
    display:flex;align-items:center;justify-content:center;gap:9px;
    box-shadow:0 6px 18px rgba(0,122,255,.36);
    transition:transform .12s ease, box-shadow .2s ease;
  }
  .geo-btn:active{transform:scale(.98);}
  .geo-btn.set{background:#e8f0fe;color:var(--blue);box-shadow:none;}

  .err{margin-top:16px;text-align:center;color:#d7141a;font-size:13.5px;min-height:16px;}

  footer{margin-top:22px;text-align:center;color:var(--ink3);font-size:11.5px;line-height:1.6;}
  .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#34c759;margin-right:6px;vertical-align:middle;
         box-shadow:0 0 0 0 rgba(52,199,89,.5);animation:p 1.8s infinite;}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(52,199,89,.5)}70%{box-shadow:0 0 0 8px rgba(52,199,89,0)}100%{box-shadow:0 0 0 0 rgba(52,199,89,0)}}
</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="flag"><i class="b"></i><i class="r"></i><i class="g"></i></div>
      <h1>Kennzeichen-Finder</h1>
      <div class="sub">Type a German plate prefix to find the<br>city and how far it is from you.</div>
    </header>

    <div class="plate" id="plateBox">
      <div class="eu">
        <div class="stars">★★★<br>★&nbsp;&nbsp;★<br>★★★</div>
        <div class="d">D</div>
      </div>
      <input id="code" inputmode="text" autocomplete="off" autocapitalize="characters"
             spellcheck="false" maxlength="3" placeholder="M" aria-label="Plate prefix" />
    </div>
    <div class="hint"><b>B</b> Berlin · <b>M</b> München · <b>HH</b> Hamburg · <b>GAP</b> Garmisch</div>

    <div class="suggest" id="suggest"></div>

    <div class="result" id="result">
      <div class="rhead">
        <div>
          <div class="city" id="rCity">—</div>
          <div class="region" id="rRegion"></div>
        </div>
        <div class="badge" id="rBadge">M</div>
      </div>

      <div class="divider"></div>

      <div class="distrow">
        <div>
          <div class="dlabel">Distance</div>
          <div class="dval">
            <div class="dnum" id="rDist">—</div>
            <div class="dunit">km</div>
          </div>
        </div>
        <div class="dmeta">
          <div id="rBearing">↗ —</div>
          <div id="rCoord">—, —</div>
        </div>
      </div>

      <button class="geo-btn" id="locBtn"><span>◎</span> Use my location</button>
    </div>

    <div class="err" id="err"></div>

    <footer>
      <div id="geoStatus"></div>
      <div>Offline-ready · Add to Home Screen · Data: official Kfz-Kennzeichen</div>
    </footer>
  </div>

<script src="plates.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const input=$('code'), result=$('result'), err=$('err');
  const rCity=$('rCity'), rRegion=$('rRegion'), rBadge=$('rBadge'),
        rDist=$('rDist'), rBearing=$('rBearing'), rCoord=$('rCoord'),
        suggest=$('suggest'), locBtn=$('locBtn'), geoStatus=$('geoStatus');

  let home=null, current=null;

  function haversine(a,b){
    const R=6371, toR=x=>x*Math.PI/180;
    const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
    const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(s));
  }
  function bearing(a,b){
    const toR=x=>x*Math.PI/180, toD=x=>x*180/Math.PI;
    const dLng=toR(b.lng-a.lng);
    const y=Math.sin(dLng)*Math.cos(toR(b.lat));
    const x=Math.cos(toR(a.lat))*Math.sin(toR(b.lat))-Math.sin(toR(a.lat))*Math.cos(toR(b.lat))*Math.cos(dLng);
    return (toD(Math.atan2(y,x))+360)%360;
  }
  const WORDS=['north','northeast','east','southeast','south','southwest','west','northwest'];
  const ARROWS=['↑','↗','→','↘','↓','↙','←','↖'];
  const dirIndex=deg=>Math.round(deg/45)%8;

  function lookup(raw){
    const code=(raw.toUpperCase().match(/^[A-ZÄÖÜ]+/)||[''])[0];
    if(!code) return null;
    for(let len=Math.min(3,code.length); len>=1; len--){
      const key=code.slice(0,len);
      if(window.PLATES[key]) return {key, ...window.PLATES[key]};
    }
    return null;
  }

  function showSuggestions(raw){
    const q=(raw.toUpperCase().match(/^[A-ZÄÖÜ]+/)||[''])[0];
    suggest.innerHTML='';
    if(q.length<1 || lookup(q)) return;
    Object.keys(window.PLATES).filter(k=>k.startsWith(q)).slice(0,5).forEach(k=>{
      const b=document.createElement('button');
      b.innerHTML='<span class="sc">'+k+'</span><span class="sn">'+window.PLATES[k].city+'</span>';
      b.onclick=()=>{ input.value=k; render(); input.focus(); };
      suggest.appendChild(b);
    });
  }

  const fmtDist=km=> km<10 ? km.toFixed(1) : Math.round(km).toLocaleString('en-US');

  function render(){
    const raw=input.value;
    showSuggestions(raw);
    const hit=lookup(raw);
    err.textContent='';
    if(!hit){
      result.classList.remove('show');
      current=null;
      if(raw.replace(/[^A-ZÄÖÜ]/gi,'').length>=1) err.textContent='No matching German registration code.';
      return;
    }
    current=hit;
    rBadge.textContent=hit.key;
    const m=hit.city.match(/^(.*?)\s*\((.*)\)\s*$/);
    let cityName, district;
    if(m){ cityName=m[1].trim(); district=m[2].trim(); }
    else { cityName=hit.city; district='Registration district'; }
    rCity.textContent=cityName;
    rRegion.textContent = hit.st ? district+' · '+hit.st : district;
    rCoord.textContent=hit.lat.toFixed(3)+', '+hit.lng.toFixed(3);
    result.classList.add('show');
    updateDistance();
  }

  function updateDistance(){
    if(!current) return;
    if(!home){
      rDist.textContent='—';
      rBearing.textContent='tap below to locate';
      return;
    }
    const km=haversine(home,current);
    const i=dirIndex(bearing(home,current));
    rDist.textContent=fmtDist(km);
    rBearing.textContent=ARROWS[i]+' '+WORDS[i];
  }

  function getLocation(){
    if(!navigator.geolocation){ err.textContent='Geolocation not supported.'; return; }
    locBtn.innerHTML='<span>◎</span> Locating…';
    navigator.geolocation.getCurrentPosition(pos=>{
      home={lat:pos.coords.latitude, lng:pos.coords.longitude};
      locBtn.innerHTML='<span>◎</span> Location set';
      locBtn.classList.add('set');
      geoStatus.innerHTML='<span class="pulse"></span>Using your live location';
      try{ localStorage.setItem('home',JSON.stringify(home)); }catch(e){}
      updateDistance();
    }, e=>{
      err.textContent = e.code===1 ? 'Location permission denied — distances need your location.' : 'Could not get your location.';
      locBtn.innerHTML='<span>◎</span> Use my location';
    }, {enableHighAccuracy:true, timeout:10000, maximumAge:60000});
  }

  try{
    const saved=localStorage.getItem('home');
    if(saved){ home=JSON.parse(saved); geoStatus.innerHTML='<span class="pulse"></span>Using saved location'; }
  }catch(e){}

  input.addEventListener('input', render);
  $('plateBox').addEventListener('click', ()=>input.focus());
  locBtn.addEventListener('click', getLocation);
  input.focus();

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();
</script>
</body>
</html>
